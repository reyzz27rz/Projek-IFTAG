<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ABSOLUTE</title>
  <link rel="stylesheet" href="Login.css"/>
</head>
<body>

  <!-- AUTH PAGE — LOGIN
 -->
  <div class="auth-page">
    <div class="auth-container">

      <!-- Logo -->
      <div class="auth-header">
        <div class="auth-logo">AQILUA<span>VISION</span></div>
        <p class="auth-subtitle">Pengalaman Nonton Terbaik</p>
      </div>

      <!-- Card -->
      <div class="auth-card">
        <h2>Masuk</h2>
        <p class="auth-desc">Selamat datang kembali! Masuk untuk melanjutkan.</p>


        <form action="index.html" method="get">

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="nama@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Kata Sandi</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Masukkan kata sandi"
                required
              />
              <span class="input-icon"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
            Masuk ke Akun
          </button>

        </form>

        <div class="auth-footer">
          Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </div>
          </div>
      </div>
    </div>
  </div>

</body>
</html>
