<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Musik</title>
  <link rel="stylesheet" href="Register.css"/>
</head>
<body>

  <!-- ================================================
      AUTH PAGE — REGISTER
      ================================================ -->
  <div class="auth-page">
    <div class="auth-container" style="max-width:500px;">

      <!-- Logo -->
      <div class="auth-header">
        <div class="auth-logo">MUSIK<span>MANTAP</span></div>
        <p class="auth-subtitle">Buat Akun Baru</p>
      </div>

      <!-- Card -->
      <div class="auth-card">
        <h2>DAFTAR</h2>
        <p class="auth-desc">Bergabunglah dan nikmati musik dengan kualitas atas.</p>

        <form action="../Login/Login.html" method="get">

          <!-- Nama Lengkap -->
          <div class="form-group">
            <label for="fullname">Nama Lengkap</label>
            <input
              type="text"
              id="fullname"
              name="fullname"
              class="form-control"
              placeholder="Nama lengkap Anda"
              required
            />
          </div>

          <!-- Email & Nomor HP -->
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="nama@email.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="phone">Nomor HP</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="form-control"
                placeholder="08xxxxxxxxxx"
                required
              />
            </div>
          </div>

          <!-- Tanggal Lahir & Jenis Kelamin -->
          <div class="form-row">
            <div class="form-group">
              <label for="dob">Tanggal Lahir</label>
              <input
                type="date"
                id="dob"
                name="dob"
                class="form-control"
              />
            </div>
            <div class="form-group">
              <label for="gender">Jenis Kelamin</label>
              <select id="gender" name="gender" class="form-control">
                <option value="">Pilih...</option>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
              </select>
            </div>
          </div>

          <!-- Kata Sandi -->
          <div class="form-group">
            <label for="password">Kata Sandi</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Min. 8 karakter"
                required
              />
            </div>
            <div class="form-hint">Gunakan kombinasi huruf, angka, dan simbol.</div>
          </div>

          <!-- Konfirmasi Kata Sandi -->
          <div class="form-group">
            <label for="confirm">Konfirmasi Kata Sandi</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirm"
                name="confirm"
                class="form-control"
                placeholder="Ulangi kata sandi"
                required
              />
              <span class="input-icon"></span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            Buat Akun Sekarang
          </button>

        </form>

        <div class="auth-footer">
          Sudah punya akun? <a href="../Login/Login.html">Masuk di sini</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
